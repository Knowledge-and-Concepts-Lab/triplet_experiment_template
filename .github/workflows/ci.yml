name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  js-tests:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  r-tests:
    name: R Tests
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: ~/R/library
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-4.3-testthat-dplyr-stringr-readr
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("testthat", "dplyr", "stringr", "readr"), repos = "https://cloud.r-project.org")'
      - name: Run R tests
        run: |
          Rscript -e 'testthat::test_dir("cleaning/tests/testthat")'
