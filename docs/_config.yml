title: Triplet Collect
description: >-
  Software for running triadic comparison experiments (triplet tasks) using jsPsych
  with automated setup.

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

# ── Just the Docs settings ───────────────────────────────────────────────────
search_enabled: true
heading_anchors: true

color_scheme: light

# Footer links
footer_content: >-
  Knowledge &amp; Concepts Lab &mdash;
  <a href="https://github.com/Knowledge-and-Concepts-Lab/triplet_experiment_template">
  View on GitHub</a>

# Exclude files that aren't documentation pages
exclude:
  - Gemfile
  - Gemfile.lock
